name: AI自动修改仓库助手

on:
  issue_comment:
    types: [created]

jobs:
  ai_reply:

    if: contains(github.event.comment.body, '@claude') && github.event.comment.user.type != 'Bot'

    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:

      - name: checkout 仓库
        uses: actions/checkout@v4

      - name: 安装 jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: 读取 README
        run: |
          if [ -f README.md ]; then
            cat README.md > readme.txt
          else
            echo "" > readme.txt
          fi

      - name: 调用 astron-code 修改 README
        env:
          API_KEY: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          API_HOST: ${{ secrets.ANTHROPIC_BASE_URL }}
          MODEL: astron-code-latest
          CONTENT: ${{ github.event.comment.body }}

        run: |

          echo "开始调用 astron-code..."

          README_CONTENT=$(cat readme.txt)

          PROMPT="用户请求：$CONTENT
            当前 README 内容如下：
          $README_CONTENT
          请输出修改后的完整 README.md 内容（仅输出 markdown，不要解释）。"

          REQUEST=$(jq -n \
            --arg model "$MODEL" \
            --arg content "$PROMPT" \
            '{
              model: $model,
              max_tokens: 8192,
              messages: [
                {
                  role: "user",
                  content: $content
                }
              ]
            }')

          RESPONSE=$(curl -s "$API_HOST/v1/messages" \
            -H "x-api-key: $API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d "$REQUEST")

          echo "接口原始返回："
          echo "$RESPONSE"

          NEW_README=$(echo "$RESPONSE" | jq -r '
            if .content then
              .content[0].text
            elif .data.content then
              .data.content[0].text
            else
              empty
            end
          ')

          if [ -z "$NEW_README" ]; then
            echo "AI返回为空，终止更新"
            exit 1
          fi

          echo "准备更新 README..."

          echo "$NEW_README" > README.md

      - name: commit 修改 README
        run: |

          git config user.name "ai-bot"
          git config user.email "ai-bot@example.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "README 没变化，跳过提交"
            exit 0
          fi

          git commit -m "AI 自动更新 README"
          git push

      - name: 回复 Issue 评论
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}

        run: |

          curl -s -X POST \
            "https://api.github.com/repos/$REPO/issues/$ISSUE/comments" \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"body":"✅ README 已自动更新"}'
